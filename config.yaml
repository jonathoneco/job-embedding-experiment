experiment:
  name: "job-title-embedding-experiment"
  seed: 42

taxonomy:
  source: "job-roles.md"
  output_dir: "data/taxonomy"

models:
  - id: "sentence-transformers/all-MiniLM-L6-v2"
    revision: "c9745ed1d9f207416be6d2e6f8de32d1f16199bf"
    dim: 384
    label: "minilm"
  - id: "BAAI/bge-base-en-v1.5"
    revision: "a5beb1e3e68b9ab74eb54cfd186867f64f240e1a"
    dim: 768
    label: "bge-base"
  - id: "BAAI/bge-large-en-v1.5"
    revision: "d4aa6901d3a41ba39fb536a557fa166f842b0e09"
    dim: 1024
    label: "bge-large"
  # Fine-tuned model (uncomment after running src/fine_tune.py on GPU)
  # - id: "models/bge-large-finetuned"
  #   revision: null
  #   dim: 1024
  #   label: "bge-large-ft"

embedding:
  batch_size: 64
  cache_dir: "data/embeddings"

test_data:
  total: 750
  difficulty:
    easy: 250
    medium: 325
    hard: 175
  dev_size: 150
  output_dir: "data/test-cases"

generation:
  api_model: "claude-sonnet-4-20250514"
  max_tokens: 16384
  description_words: "10-15"

evaluation:
  top_k: [1, 3, 5]
  bootstrap_resamples: 1000
  production_thresholds:
    mrr: 0.75
    top3: 0.85

report:
  output: "results/report.md"
  figures_dir: "results/figures"
  metrics_dir: "results/metrics"
  error_analysis_count: 10

reranking:
  enabled: false
  model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  initial_k: 20
  top_n: 10

fusion:
  enabled: false
  k: 60
  configs:
    - name: "fusion-bge-large-bm25"
      methods: ["bge-large", "bm25"]
      granularity: "role"
    - name: "fusion-bgem3-all"
      methods: ["bgem3-dense", "bgem3-sparse", "bgem3-colbert"]
      granularity: "role"

bgem3:
  enabled: false
  model: "BAAI/bge-m3"
  granularities: ["role", "category"]
